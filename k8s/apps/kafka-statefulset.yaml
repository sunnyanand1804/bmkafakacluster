apiVersion: v1
kind: Service

metadata:
  name: kafka
  namespace: kafka-demo

spec:
  clusterIP: None
  publishNotReadyAddresses: true

  selector:
    app: kafka

  ports:
    - name: kafka
      port: 9092
      targetPort: 9092

    - name: controller
      port: 9093
      targetPort: 9093

---
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: kafka
  namespace: kafka-demo

spec:
  serviceName: kafka
  replicas: 2
  podManagementPolicy: Parallel

  selector:
    matchLabels:
      app: kafka

  template:
    metadata:
      labels:
        app: kafka

    spec:
      dnsPolicy: ClusterFirst
      terminationGracePeriodSeconds: 30

      containers:
        - name: kafka

          image: confluentinc/cp-kafka:7.5.0
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              sleep 20

              export KAFKA_NODE_ID=$(hostname | awk -F'-' '{print $NF}')

              export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://$(hostname).kafka.kafka-demo.svc.cluster.local:9092

              /etc/confluent/docker/run

          ports:
            - name: kafka
              containerPort: 9092

            - name: controller
              containerPort: 9093

          env:
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"

            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"

            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"

            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka.kafka-demo.svc.cluster.local:9093,1@kafka-1.kafka.kafka-demo.svc.cluster.local:9093"

            - name: CLUSTER_ID
              value: "MkU3OEVBNTcwNTJENDM2Qk"

            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "2"

            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "2"

            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"

          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20

          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 20

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "1Gi"
              cpu: "500m"